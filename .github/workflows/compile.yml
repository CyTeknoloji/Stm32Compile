name: STM32 Bulut Derleyici

on:
  workflow_dispatch:
    inputs:
      sketch_code:
        description: 'Kod'
        required: true
      libraries:
        description: 'Kutuphaneler (virgulle)'
        required: false
      library_files:
        description: 'Uygulamadan zip kutuphaneler (JSON)'
        required: false
      board_type:
        description: 'Kart modeli (FQBN)'
        required: true
        default: 'STMicroelectronics:stm32:GenF1:pnum=BLUEPILL_F103C8,upload_method=serialMethod'

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Arduino CLI Kur
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: STM32 cekirdek onbellegi
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: ${{ runner.os }}-stm32-core-v2

      - name: STM32 cekirdek ve kutuphaneleri hazirla
        env:
          LIBS: ${{ github.event.inputs.libraries }}
        run: |
          CLI=./bin/arduino-cli
          $CLI config add board_manager.additional_urls https://github.com/stm32duino/BoardManagerFiles/raw/main/package_stmicroelectronics_index.json
          $CLI core update-index
          $CLI core install STMicroelectronics:stm32

          install_one() {
            local trim_lib="$1"
            [ -z "$trim_lib" ] && return 0
            $CLI lib install "$trim_lib" || true
          }

          if [ -n "${LIBS:-}" ]; then
            echo "$LIBS" | tr ',' '\n' | while IFS= read -r lib; do
              install_one "$(echo "$lib" | xargs)"
            done
          fi

      - name: Uygulamadan gelen kutuphane zip dosyalari
        env:
          LIBRARY_FILES: ${{ github.event.inputs.library_files }}
        run: |
          python3 scripts/install_library_files.py

      - name: Sketch hazirla
        shell: python
        env:
          SKETCH_INPUT: ${{ github.event.inputs.sketch_code }}
        run: |
          import os
          content = os.environ.get("SKETCH_INPUT", "")
          os.makedirs("MySketch", exist_ok=True)
          with open("MySketch/MySketch.ino", "w", encoding="utf-8") as f:
              f.write(content)

      - name: Derle
        run: |
          mkdir -p output
          ./bin/arduino-cli compile --fqbn "${{ github.event.inputs.board_type }}" MySketch --output-dir ./output

      - name: BIN yayinla
        uses: actions/upload-artifact@v4
        with:
          name: stm32_build
          path: output/*.bin
          if-no-files-found: error
